<span class="ship-age" data-birth="1913-08-25">⛵ Betty is <span class="age-placeholder">…</span> years old</span>

<style>
.ship-age {
  display: inline-block;
  font-weight: 600;
  color: #1976d2;
  background: rgba(33, 150, 243, 0.1);
  padding: 0.25rem 0.5rem;
  border-radius: 6px;
  font-size: 1em;
  margin: 0.5rem 0;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const elements = document.querySelectorAll(".ship-age");
  elements.forEach(el => {
    const birthDate = new Date(el.getAttribute("data-birth"));
    const now = new Date();
    let age = now.getFullYear() - birthDate.getFullYear();
    const monthPassed = now.getMonth() > birthDate.getMonth();
    const dayPassed = now.getMonth() === birthDate.getMonth() && now.getDate() >= birthDate.getDate();
    if (!monthPassed && !dayPassed) age -= 1;
    el.querySelector(".age-placeholder").textContent = age;
  });
});
</script>
